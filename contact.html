<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contact | Lionel Messi</title>
    <link rel="stylesheet" href="asset/css/contact.css">
</head>

<body>

<div class="container">

    <h1>Contact Lionel Messi</h1>

    <!-- FOTO -->
    <img src="images/asset/messi1.jpg" class="profile-img">

    <!-- INFO -->
    <div class="info">
        <p><strong>Club:</strong> Inter Miami CF</p>
        <p><strong>Negara:</strong> Argentina</p>
        <p><strong>Posisi:</strong> Forward</p>
    </div>

    <!-- SOCIAL MEDIA -->
    <h2>Follow</h2>
    <div class="social">
        <a href="https://www.instagram.com/leomessi/" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/results?search_query=lionel+messi" target="_blank">YouTube</a>
    </div>

    <!-- FORM -->
    <h2>Send Message</h2>
    <form>
        <input type="text" placeholder="Nama" required><br><br>
        <input type="email" placeholder="Email" required><br><br>
        <textarea placeholder="Pesan..." rows="4"></textarea><br><br>
        <button type="submit">Kirim</button>
    </form>

</div>

</body>
</html>
