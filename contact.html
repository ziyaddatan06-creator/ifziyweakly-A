<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Informatika</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #34495e;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            background: #1abc9c;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 120px;
        }

        button {
            background: #1abc9c;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #16a085;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #2c3e50;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>WEB INFORMATIKA</h1>
</header>

<nav>
    <a href="home.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="contact.html">Contact</a>
    <a href="mahasiswa.html">Mahasiswa</a>
    <a href="tambahdata.html">Tambah Data</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Contact Us</h2>
        <p>Silakan kirim pesan kepada kami melalui form berikut:</p>

        <form>
            <div class="form-group">
                <input type="text" placeholder="Nama Lengkap" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <textarea placeholder="Pesan..." required></textarea>
            </div>

            <button type="submit">Kirim Pesan</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 Informatika Kelas A</p>
</footer>

</body>
</html>
