<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statistik Messi</title>
    <link rel="stylesheet" href="asset/css/statistik.css">
</head>

<body>

<h1>LIONEL MESSI</h1>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="contact.html">Contact</a>
    <a href="mahasiswa.html">Statistik</a>
</div>

<hr>

<h2>Statistik Pemain</h2>

<!-- FORM TAMBAH DATA -->
<div>
    <input type="text" id="nama" placeholder="Nama Pemain"><br><br>
    <input type="number" id="gol" placeholder="Gol"><br><br>
    <input type="number" id="assist" placeholder="Assist"><br><br>
    <input type="number" id="rating" placeholder="Rating"><br><br>

    <button onclick="tambahData()">Tambah Data</button>
</div>

<br>

<!-- TABEL -->
<table id="tabel">
<tr>
    <th>No</th>
    <th>Nama</th>
    <th>Gol</th>
    <th>Assist</th>
    <th>Rating</th>
</tr>

<tr>
    <td>1</td>
    <td>Messi</td>
    <td>30</td>
    <td>20</td>
    <td>9.5</td>
</tr>

</table>

<!-- JAVASCRIPT -->
<script>
let no = 2;

function tambahData() {
    let nama = document.getElementById("nama").value;
    let gol = document.getElementById("gol").value;
    let assist = document.getElementById("assist").value;
    let rating = document.getElementById("rating").value;

    if(nama === "" || gol === "" || assist === "" || rating === "") {
        alert("Isi semua data!");
        return;
    }

    let tabel = document.getElementById("tabel");
    let row = tabel.insertRow();

    row.insertCell(0).innerHTML = no++;
    row.insertCell(1).innerHTML = nama;
    row.insertCell(2).innerHTML = gol;
    row.insertCell(3).innerHTML = assist;
    row.insertCell(4).innerHTML = rating;

    // reset input
    document.getElementById("nama").value = "";
    document.getElementById("gol").value = "";
    document.getElementById("assist").value = "";
    document.getElementById("rating").value = "";
}
</script>

</body>
</html>
